openapi: "3.1.0"
info:
  title: Petstore 3.1
  version: 1.0.0
  summary: A petstore spec using OpenAPI 3.1 features
jsonSchemaDialect: "https://json-schema.org/draft/2020-12/schema"
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            exclusiveMaximum: 100
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Pet deleted
    patch:
      operationId: updatePet
      summary: Update a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetUpdate"
      responses:
        "200":
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type:
            - string
            - "null"
        status:
          oneOf:
            - $ref: "#/components/schemas/ActiveStatus"
            - $ref: "#/components/schemas/ArchivedStatus"
          discriminator:
            propertyName: type
            mapping:
              active: "#/components/schemas/ActiveStatus"
              archived: "#/components/schemas/ArchivedStatus"
        metadata:
          type: object
          additionalProperties: true
          readOnly: true
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type:
            - string
            - "null"
    PetUpdate:
      type: object
      properties:
        name:
          type: string
        tag:
          type:
            - string
            - "null"
    ActiveStatus:
      type: object
      required:
        - type
        - since
      properties:
        type:
          const: active
        since:
          type: string
          format: date
    ArchivedStatus:
      type: object
      required:
        - type
        - reason
      properties:
        type:
          const: archived
        reason:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    # Circular reference test
    Category:
      type: object
      properties:
        name:
          type: string
        parent:
          $ref: "#/components/schemas/Category"
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"
