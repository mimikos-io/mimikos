openapi: "3.0.0"
info:
  title: Response Ref E2E Test
  version: "1.0"
  description: >
    Test spec for verifying that response-level $ref pointers are resolved
    correctly. Uses shared error responses via $ref, which is a common pattern
    in real-world specs (Spotify, GitHub, SendGrid).
paths:
  /items:
    get:
      operationId: listItems
      summary: List all items
      responses:
        "200":
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createItem
      summary: Create an item
      requestBody:
        $ref: "#/components/requestBodies/ItemCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item by ID
      responses:
        "200":
          description: An item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteItem
      summary: Delete an item
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
  requestBodies:
    ItemCreate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                $ref: "#/components/schemas/ErrorObject"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                $ref: "#/components/schemas/ErrorObject"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorObject"
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorObject"
