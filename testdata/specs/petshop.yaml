openapi: "3.0.3"
info:
  title: PetShop Pro API
  version: "1.0.0"
  description: >
    A comprehensive pet shop management API demonstrating the full breadth of
    OpenAPI 3.0 features. Designed as the reference spec for Mimikos — every
    endpoint, schema, and example exercises a specific Mimikos capability.

    Resources: pets, owners, store (inventory + orders), clinics (with nested
    rooms), and a current-user singleton. Covers all five CRUD behaviors, three
    example levels, request validation, shared error responses, polymorphism,
    allOf composition, nullable references, and stateful mode patterns.
  contact:
    name: Mimikos
    url: https://mimikos.dev
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Mimikos mock server

paths:
  # -----------------------------------------------------------------------
  # Pets — core CRUD, all example levels, classifier patterns
  # -----------------------------------------------------------------------
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: >
        Returns a list of pets. Demonstrates: list classification, bare array
        response, query parameters, explicit 500 error status.
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            format: int32
        - name: status
          in: query
          description: Filter by adoption status
          required: false
          schema:
            type: string
            enum:
              - available
              - adopted
              - pending
        - name: species
          in: query
          description: Filter by species
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Pet"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPet
      summary: Create a pet
      description: >
        Creates a new pet. Demonstrates: create classification (201), request
        body $ref, required body validation, schema-less 422 error.
      tags:
        - Pets
      requestBody:
        $ref: "#/components/requestBodies/PetCreate"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              example:
                id: 100
                name: "Buddy"
                species: "dog"
                age: 2
                weight: 12.5
                vaccinated: true
                status: "available"
                microchip_id: "985112345678903"
                tags:
                  - "friendly"
                  - "trained"
        "422":
          description: Unprocessable entity

  /pets/{petId}:
    get:
      operationId: getPet
      summary: Info for a specific pet
      description: >
        Returns a single pet by ID. Demonstrates: fetch classification, plural
        media-type examples (named), explicit 404/403 errors, response $ref,
        default error response, property-level examples.
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              examples:
                fido:
                  summary: A friendly dog
                  value:
                    id: 42
                    name: "Fido"
                    species: "dog"
                    age: 3
                    weight: 12.5
                    vaccinated: true
                    status: "available"
                    microchip_id: "985112345678903"
                    tags:
                      - "friendly"
                      - "trained"
                    metadata:
                      registered_at: "2024-01-15"
                      source: "shelter"
                whiskers:
                  summary: A curious cat
                  value:
                    id: 43
                    name: "Whiskers"
                    species: "cat"
                    age: 5
                    weight: 4.2
                    vaccinated: false
                    status: "pending"
                    microchip_id: "985112345678904"
                    tags:
                      - "indoor"
                    metadata:
                      registered_at: "2024-03-22"
                      source: "owner-surrender"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: updatePetViaPost
      summary: Update a pet
      description: >
        Updates a pet using POST (Stripe-style). Demonstrates: POST-as-update
        classification via L3 summary scanning — the summary contains "Update"
        which overrides the default POST-to-item classification.
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetUpdate"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    patch:
      operationId: updatePet
      summary: Partially update a pet
      description: >
        Partially updates a pet. Demonstrates: update classification (PATCH),
        optional request body (required: false).
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetUpdate"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      summary: Delete a pet
      description: >
        Deletes a pet by ID. Demonstrates: delete classification (204),
        response-level $ref for shared 403 error.
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "204":
          description: Pet deleted
        "403":
          $ref: "#/components/responses/Forbidden"

  /pets/{petId}/avatar:
    delete:
      operationId: deletePetAvatar
      summary: Delete pet avatar
      description: >
        Deletes the avatar image for a pet. Demonstrates: sub-resource delete
        detection (L1 singular last segment with parent path param).
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "204":
          description: Avatar deleted

  /pets/{petId}/vaccinations:
    get:
      operationId: listPetVaccinations
      summary: List vaccination records for a pet
      description: >
        Returns vaccination records for a specific pet. Demonstrates:
        sub-resource list, media-type $ref example (components/examples),
        allOf composition in schema.
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "200":
          description: A list of vaccination records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaccinationRecord"
              examples:
                sampleVaccinations:
                  $ref: "#/components/examples/VaccinationListExample"

  /pets/{petId}/verify:
    post:
      operationId: verifyPetMicrochip
      summary: Verify pet microchip
      description: >
        Verifies a pet's microchip registration. Demonstrates: action/generic
        endpoint classification — "verify" is a known action verb in L1,
        producing generic behavior (200, not 201).
      tags:
        - Pets
      parameters:
        - $ref: "#/components/parameters/PetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - microchip_id
              properties:
                microchip_id:
                  type: string
                  example: "985112345678903"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Microchip verified successfully"
                  registered_owner:
                    type: string
                    example: "Alice Johnson"

  # -----------------------------------------------------------------------
  # Owners — semantic fields, Level 2 examples, format validation
  # -----------------------------------------------------------------------
  /owners:
    get:
      operationId: listOwners
      summary: List all pet owners
      description: >
        Returns a list of pet owners. Demonstrates: semantic field mapping
        (email, phone generate realistic values without examples).
      tags:
        - Owners
      parameters:
        - name: limit
          in: query
          description: Maximum number of owners to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: A list of owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Owner"
    post:
      operationId: createOwner
      summary: Register a new pet owner
      description: >
        Registers a new owner. Demonstrates: format validation (email), required
        fields, nested object in request body.
      tags:
        - Owners
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOwner"
      responses:
        "201":
          description: Owner registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"

  /owners/{ownerId}:
    get:
      operationId: getOwner
      summary: Get owner details
      description: >
        Returns a single owner by ID. Demonstrates: fetch classification,
        Level 2 schema-root example on nested Address object.
      tags:
        - Owners
      parameters:
        - name: ownerId
          in: path
          required: true
          description: The ID of the owner
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Owner details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"
        "404":
          $ref: "#/components/responses/NotFound"

  # -----------------------------------------------------------------------
  # Store — singleton, wrapped lists, PUT update
  # -----------------------------------------------------------------------
  /store/inventory:
    get:
      operationId: store-getInventory
      summary: Show store inventory
      description: >
        Returns current store inventory counts. Demonstrates: singleton fetch
        (L3 operationId override — "get" keyword at position > 0), media-type
        singular example (returned as-is).
      tags:
        - Store
      responses:
        "200":
          description: Current inventory counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreInventory"
              example:
                dogs: 12
                cats: 8
                birds: 3
                reptiles: 2
                last_updated: "2024-11-15T09:30:00Z"

  /store/orders:
    get:
      operationId: listOrders
      summary: List all store orders
      description: >
        Returns a paginated list of orders. Demonstrates: object-wrapped list
        with non-"data" array key ("orders"), pagination metadata fields.
      tags:
        - Store
      parameters:
        - name: limit
          in: query
          description: Maximum number of orders to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of orders to skip
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Paginated list of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      summary: Place a new order
      description: >
        Creates a new store order. Demonstrates: request body $ref (from
        components/requestBodies).
      tags:
        - Store
      requestBody:
        $ref: "#/components/requestBodies/OrderCreate"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /store/orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order details
      description: >
        Returns a single order by ID. Demonstrates: fetch classification on
        nested resource path.
      tags:
        - Store
      parameters:
        - name: orderId
          in: path
          required: true
          description: The ID of the order
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateOrder
      summary: Update an order
      description: >
        Replaces an order. Demonstrates: PUT update classification.
      tags:
        - Store
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrder"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: cancelOrder
      summary: Cancel an order
      description: >
        Cancels (deletes) an order. Demonstrates: delete classification (204).
      tags:
        - Store
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Order cancelled

  # -----------------------------------------------------------------------
  # Clinics — data-wrapped responses, nested resources, parent scope
  # -----------------------------------------------------------------------
  /clinics:
    get:
      operationId: listClinics
      summary: List all clinics
      description: >
        Returns a list of clinics. Demonstrates: data-wrapped list response
        (Asana pattern — {data: [...]}).
      tags:
        - Clinics
      responses:
        "200":
          description: List of clinics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicList"
    post:
      operationId: createClinic
      summary: Register a new clinic
      description: >
        Creates a new clinic. Demonstrates: data-wrapped create response,
        non-standard ID field (clinic_id via IDFieldHint).
      tags:
        - Clinics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewClinic"
      responses:
        "201":
          description: Clinic registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicWrapper"

  /clinics/{clinicId}:
    get:
      operationId: getClinic
      summary: Get clinic details
      description: >
        Returns a single clinic. Demonstrates: data-wrapped fetch response.
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
      responses:
        "200":
          description: Clinic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicWrapper"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateClinic
      summary: Update a clinic
      description: >
        Updates a clinic. Demonstrates: PUT update with data-wrapped response.
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewClinic"
      responses:
        "200":
          description: Clinic updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicWrapper"
    delete:
      operationId: deleteClinic
      summary: Remove a clinic
      description: >
        Removes a clinic. Demonstrates: non-204 delete (returns 200 with
        data-wrapped empty object, Asana pattern).
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
      responses:
        "200":
          description: Clinic removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object

  /clinics/{clinicId}/rooms:
    get:
      operationId: listClinicRooms
      summary: List rooms in a clinic
      description: >
        Returns rooms belonging to a specific clinic. Demonstrates: nested
        resource list with parent scope isolation — rooms under clinic A are
        not visible when listing clinic B's rooms.
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicRoom"
    post:
      operationId: createClinicRoom
      summary: Add a room to a clinic
      description: >
        Creates a new room in a clinic. Demonstrates: nested resource create
        with parent scope.
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewClinicRoom"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicRoom"

  /clinics/{clinicId}/rooms/{roomId}:
    get:
      operationId: getClinicRoom
      summary: Get room details
      description: >
        Returns a single room in a clinic. Demonstrates: nested resource fetch.
      tags:
        - Clinics
      parameters:
        - $ref: "#/components/parameters/ClinicId"
        - name: roomId
          in: path
          required: true
          description: The ID of the room
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicRoom"
        "404":
          $ref: "#/components/responses/NotFound"

  # -----------------------------------------------------------------------
  # Current User — singleton endpoint
  # -----------------------------------------------------------------------
  /me:
    get:
      operationId: users-getCurrentUser
      summary: Show current user
      description: >
        Returns the authenticated user. Demonstrates: singleton fetch
        classification (L3 operationId override — "get" at position > 0
        with "users-" prefix triggers list→fetch override).
      tags:
        - Users
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: "usr_001"
                username: "petlover42"
                email: "petlover42@example.com"
                role: "admin"
                created_at: "2024-01-10T08:00:00Z"

# ==========================================================================
# Components
# ==========================================================================
components:

  # --- Parameters (reusable) ---
  parameters:
    PetId:
      name: petId
      in: path
      required: true
      description: The ID of the pet
      schema:
        type: integer
        format: int64
    ClinicId:
      name: clinicId
      in: path
      required: true
      description: The ID of the clinic
      schema:
        type: string

  # --- Schemas ---
  schemas:

    # --- Pet (core resource — all example levels, constraints, formats) ---
    Pet:
      type: object
      required:
        - id
        - name
        - species
      properties:
        id:
          type: integer
          format: int64
          example: 101
        name:
          type: string
          minLength: 1
          example: "Fido"
        species:
          type: string
          example: "dog"
        age:
          type: integer
          minimum: 0
          maximum: 30
          example: 3
        weight:
          type: number
          format: double
          minimum: 0
          example: 12.5
        vaccinated:
          type: boolean
          example: true
        status:
          type: string
          enum:
            - available
            - adopted
            - pending
          example: "adopted"
          description: >
            Adoption status. Has both enum and example — Mimikos uses enum
            values (seed-based selection) over the example value.
        microchip_id:
          type: string
          description: >
            Microchip identifier. No example value and no semantic mapper
            match — Mimikos falls back to faker string generation.
        tags:
          $ref: "#/components/schemas/TagList"
        owner:
          description: >
            Reference to the pet's owner. Nullable — the pet may not have
            been adopted yet. Demonstrates nullable $ref (3.0 pattern).
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OwnerSummary"
        adoption_status:
          description: >
            Detailed adoption status. Demonstrates oneOf with discriminator
            for polymorphic response generation.
          oneOf:
            - $ref: "#/components/schemas/ActiveStatus"
            - $ref: "#/components/schemas/ArchivedStatus"
          discriminator:
            propertyName: type
            mapping:
              active: "#/components/schemas/ActiveStatus"
              archived: "#/components/schemas/ArchivedStatus"
        metadata:
          type: object
          additionalProperties: true
          description: >
            Arbitrary metadata. Demonstrates additionalProperties: true.
        category:
          $ref: "#/components/schemas/Category"

    NewPet:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
          minLength: 1
        species:
          type: string
        age:
          type: integer
          minimum: 0
          maximum: 30
        weight:
          type: number
          minimum: 0
        status:
          type: string
          enum:
            - available
            - adopted
            - pending

    PetUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        species:
          type: string
        age:
          type: integer
          minimum: 0
          maximum: 30
        weight:
          type: number
          minimum: 0
        status:
          type: string
          enum:
            - available
            - adopted
            - pending

    # --- Owner (semantic fields, Level 2 address example) ---
    Owner:
      type: object
      required:
        - id
        - first_name
        - last_name
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        first_name:
          type: string
          example: "Alice"
        last_name:
          type: string
          example: "Johnson"
        email:
          type: string
          format: email
          description: >
            Contact email. No example — Mimikos uses semantic mapper
            (field name "email" → email generator).
        phone:
          type: string
          description: >
            Phone number. No example — Mimikos uses semantic mapper
            (field name "phone" → phone generator).
        address:
          $ref: "#/components/schemas/Address"
        registered_at:
          type: string
          format: date-time
          description: >
            Registration timestamp. No example — Mimikos uses format-aware
            generation (date-time → ISO 8601 timestamp).

    NewOwner:
      type: object
      required:
        - first_name
        - last_name
        - email
      properties:
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: "#/components/schemas/Address"

    OwnerSummary:
      type: object
      description: Abbreviated owner info embedded in Pet responses.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Alice Johnson"

    # --- Address (Level 2 schema-root example) ---
    Address:
      type: object
      description: >
        Mailing address. Has a schema-root example — Mimikos Level 2 returns
        this example object for the entire sub-object instead of generating
        each property independently.
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
      example:
        street: "742 Evergreen Terrace"
        city: "Portland"
        state: "OR"
        zip: "97201"
        country: "US"

    # --- TagList (Level 2 schema-root example — array) ---
    TagList:
      type: array
      description: >
        List of tags. Has a schema-root example — Mimikos Level 2 returns
        this example array instead of generating individual items.
      items:
        type: string
      example:
        - "friendly"
        - "trained"
        - "vaccinated"

    # --- Vaccination (allOf composition) ---
    VaccinationBase:
      type: object
      required:
        - id
        - vaccine_name
      properties:
        id:
          type: integer
          format: int64
        vaccine_name:
          type: string
        administered_at:
          type: string
          format: date

    VaccinationDetails:
      type: object
      properties:
        veterinarian:
          type: string
          example: "Dr. Smith"
        clinic_name:
          type: string
          example: "Happy Paws Clinic"
        next_due:
          type: string
          format: date
          example: "2025-06-15"
        batch_number:
          type: string
          example: "VAX-2024-001"

    VaccinationRecord:
      description: >
        A vaccination record combining base fields and details via allOf.
        Demonstrates allOf composition — Mimikos merges properties from
        both schemas into a single response object.
      allOf:
        - $ref: "#/components/schemas/VaccinationBase"
        - $ref: "#/components/schemas/VaccinationDetails"

    # --- Polymorphism (oneOf + discriminator) ---
    ActiveStatus:
      type: object
      required:
        - type
        - since
      properties:
        type:
          type: string
          enum:
            - active
          description: Discriminator value. Mimikos uses const/enum to produce "active".
        since:
          type: string
          format: date
          example: "2024-01-15"

    ArchivedStatus:
      type: object
      required:
        - type
        - reason
      properties:
        type:
          type: string
          enum:
            - archived
          description: Discriminator value. Mimikos uses const/enum to produce "archived".
        reason:
          type: string
          example: "Owner relocated"
        archived_at:
          type: string
          format: date-time

    # --- Circular reference ---
    Category:
      type: object
      description: >
        Pet category with self-referencing parent/children. Demonstrates
        circular reference handling — Mimikos terminates at depth limit
        (nil for objects, [] for arrays).
      properties:
        name:
          type: string
          example: "Dogs"
        parent:
          $ref: "#/components/schemas/Category"
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    # --- Store Inventory (singleton) ---
    StoreInventory:
      type: object
      description: >
        Current inventory counts. Used by the singleton GET /store/inventory
        endpoint which has a media-type singular example.
      properties:
        dogs:
          type: integer
        cats:
          type: integer
        birds:
          type: integer
        reptiles:
          type: integer
        last_updated:
          type: string
          format: date-time

    # --- Orders (wrapped list pattern) ---
    Order:
      type: object
      required:
        - id
        - pet_id
        - status
      properties:
        id:
          type: string
          format: uuid
        pet_id:
          type: integer
          format: int64
          description: Reference to the ordered pet
        quantity:
          type: integer
          minimum: 1
          example: 1
        status:
          type: string
          enum:
            - placed
            - approved
            - delivered
            - cancelled
          example: "placed"
        placed_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true

    NewOrder:
      type: object
      required:
        - pet_id
      properties:
        pet_id:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1
        notes:
          type: string

    OrderList:
      type: object
      description: >
        Paginated order list. Demonstrates object-wrapped list with non-"data"
        array key ("orders"). In stateful mode, Mimikos detects "orders" as the
        list array key and wraps stored resources in this envelope.
      required:
        - orders
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
          description: Total number of orders
        has_more:
          type: boolean
          description: Whether more orders exist beyond this page

    # --- Clinics (data-wrapped pattern) ---
    Clinic:
      type: object
      required:
        - clinic_id
        - name
      properties:
        clinic_id:
          type: string
          description: >
            Non-standard ID field name. Mimikos uses IDFieldHint to detect
            that "clinic_id" is the identity field (via StripResourcePrefix
            on the "clinics" collection path).
        name:
          type: string
          example: "Happy Paws Veterinary"
        address:
          type: string
          example: "456 Oak Avenue"
        phone:
          type: string
        established:
          type: string
          format: date
          example: "2015-03-20"

    NewClinic:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        phone:
          type: string

    ClinicWrapper:
      type: object
      description: >
        Data-wrapped clinic response (Asana pattern). Mimikos detects the
        "data" wrapper key and unwraps/rewraps transparently in stateful mode.
      properties:
        data:
          $ref: "#/components/schemas/Clinic"

    ClinicList:
      type: object
      description: >
        Data-wrapped clinic list. Demonstrates wrapper key detection for
        list responses in stateful mode.
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Clinic"

    # --- Clinic Rooms (nested resource) ---
    ClinicRoom:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
          example: "Exam Room 1"
        type:
          type: string
          enum:
            - examination
            - surgery
            - recovery
            - grooming
          example: "examination"
        capacity:
          type: integer
          minimum: 1
          maximum: 20
          example: 2

    NewClinicRoom:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - examination
            - surgery
            - recovery
            - grooming
        capacity:
          type: integer
          minimum: 1
          maximum: 20

    # --- User (singleton) ---
    User:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - staff
            - viewer
        created_at:
          type: string
          format: date-time

    # --- Error schemas ---
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
          nullable: true

  # --- Examples (reusable) ---
  examples:
    VaccinationListExample:
      summary: Sample vaccination records
      value:
        - id: 1
          vaccine_name: "Rabies"
          administered_at: "2024-03-15"
          veterinarian: "Dr. Smith"
          clinic_name: "Happy Paws Clinic"
          next_due: "2025-03-15"
          batch_number: "VAX-2024-001"
        - id: 2
          vaccine_name: "DHPP"
          administered_at: "2024-04-01"
          veterinarian: "Dr. Lee"
          clinic_name: "City Vet Center"
          next_due: "2025-04-01"
          batch_number: "VAX-2024-042"

  # --- Shared request bodies ---
  requestBodies:
    PetCreate:
      description: Request body for creating a new pet
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NewPet"
    OrderCreate:
      description: Request body for placing a new order
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NewOrder"

  # --- Shared responses (response-level $ref) ---
  responses:
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 403
              message: "Insufficient permissions"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 404
            message: "Resource not found"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 429
              message: "Rate limit exceeded, retry after 60 seconds"
