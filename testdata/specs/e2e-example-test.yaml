openapi: "3.0.0"
info:
  title: Example-Aware Generation Test
  version: "1.0.0"
  description: >
    Test spec for verifying that property-level example values are used in
    response generation. Covers string, integer, number, boolean examples,
    enum+example priority, and fields without examples (semantic/faker fallback).
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /adoptions/{adoptionId}:
    get:
      operationId: getAdoption
      summary: Get an adoption record
      parameters:
        - name: adoptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: An adoption record with a nullable pet reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Adoption"
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: "Fido"
        species:
          type: string
          example: "dog"
        age:
          type: integer
          example: 3
        weight:
          type: number
          example: 4.5
        vaccinated:
          type: boolean
          example: true
        status:
          type: string
          enum:
            - available
            - adopted
            - pending
          example: "adopted"
        email:
          type: string
          description: Contact email — no example, should use semantic mapper
        tag:
          type: string
          description: Arbitrary tag — no example, no semantic match, uses faker
    Owner:
      type: object
      properties:
        name:
          type: string
          example: "Alice Johnson"
        phone:
          type: string
          example: "555-0123"
    Adoption:
      type: object
      required:
        - id
        - pet
      properties:
        id:
          type: integer
          example: 42
        pet:
          # nullable $ref — the critical pattern. OpenAPI 3.0 nullable + $ref
          # is normalized to anyOf: [{$ref: Pet}, {type: null}] by the compiler.
          # Without nullable preference, seed-based selection hides Pet examples ~50%.
          nullable: true
          $ref: "#/components/schemas/Pet"
        owner:
          # Second nullable $ref — tests the pattern on a different schema.
          nullable: true
          $ref: "#/components/schemas/Owner"
        notes:
          # Inline nullable string (type + nullable, no $ref).
          # Already handled by resolveComplexType — included to verify no regression.
          type: string
          nullable: true
          example: "Friendly dog, good with children"
