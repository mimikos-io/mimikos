openapi: "3.0.0"
info:
  title: Example-Aware Generation Test
  version: "1.0.0"
  description: >
    Test spec for verifying that property-level example values are used in
    response generation. Covers string, integer, number, boolean examples,
    enum+example priority, and fields without examples (semantic/faker fallback).
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: "Fido"
        species:
          type: string
          example: "dog"
        age:
          type: integer
          example: 3
        weight:
          type: number
          example: 4.5
        vaccinated:
          type: boolean
          example: true
        status:
          type: string
          enum:
            - available
            - adopted
            - pending
          example: "adopted"
        email:
          type: string
          description: Contact email — no example, should use semantic mapper
        tag:
          type: string
          description: Arbitrary tag — no example, no semantic match, uses faker
